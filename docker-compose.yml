version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: contabilidad-postgres
    environment:
      POSTGRES_USER: contabilidad_user
      POSTGRES_PASSWORD: contabilidad_pass_secure_123
      POSTGRES_DB: contabilidad
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - contabilidad-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U contabilidad_user -d contabilidad"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Opcional: pgAdmin para administración de BD
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: contabilidad-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@contabilidad.local
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      - postgres
    networks:
      - contabilidad-network
    profiles:
      - with-admin

volumes:
  postgres_data:

networks:
  contabilidad-network:
    driver: bridge
